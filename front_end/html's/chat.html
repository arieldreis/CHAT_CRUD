<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Simples</title>
    <link rel="stylesheet" href="../styles/chat.css">
    <script src="../scripts/chat.js" defer></script>
</head>
<body>

    <header class="navbar">
        <div class="user-greeting">Olá, <strong>nome_user!</strong></div>
        <nav>
            <ul class="nav-links">
                <li><a href="#">Início</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Configurações</a></li>
            </ul>
        </nav>
    </header>

    <main class="chat-container">
        <div class="chat-window">
            <div class="message received">
                <p>Olá! Como posso te ajudar hoje?</p>
                <span class="time">10:00</span>
            </div>

            <div class="message sent">
                <p>Oi! Estou testando esta interface de chat.</p>
                <span class="time">10:02</span>
            </div>
            
            <div class="message received">
                <p>Ficou muito legal! O design está bem limpo.</p>
                <span class="time">10:05</span>
            </div>
        </div>

        <form class="chat-input-area">
            <input type="text" placeholder="Digite sua mensagem..." aria-label="Mensagem">
            <button type="submit">Enviar</button>
        </form>
    </main>

</body>
</html>
